# Build image and redeploy Cloud Run Job with settings from cloud/prognosis-config.env
substitutions:
  _REGION: europe-west1
  _JOB_NAME: prognosis-sheets
  _AR_REPO: zoho

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - cloud/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        set -a
        # shellcheck disable=SC1091
        source cloud/prognosis-config.env
        set +a
        gcloud run jobs deploy ${_JOB_NAME} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}:$COMMIT_SHA \
          --region=${_REGION} \
          --service-account=prognosis-runner@$PROJECT_ID.iam.gserviceaccount.com \
          --max-retries=1 \
          --task-timeout=300s \
          --set-secrets=/secrets/sheets-sa.json=prognosis-sheets-sa-key:latest \
          --set-secrets=ZOHO_CLIENT_ID=prognosis-zoho_client_id:latest \
          --set-secrets=ZOHO_CLIENT_SECRET=prognosis-zoho_client_secret:latest \
          --set-secrets=ZOHO_REFRESH_TOKEN=prognosis-zoho_refresh_token:latest \
          --set-env-vars="ZOHO_ORG_ID=$${ZOHO_ORG_ID}" \
          --set-env-vars="ZOHO_WORKSPACE_ID=$${ZOHO_WORKSPACE_ID}" \
          --set-env-vars="GOOGLE_SHEETS_ID=$${GOOGLE_SHEETS_ID}" \
          --set-env-vars="GOOGLE_SHEETS_GID=$${GOOGLE_SHEETS_GID}" \
          --set-env-vars="GOOGLE_SHEETS_CELL_CURRENT=$${GOOGLE_SHEETS_CELL_CURRENT}" \
          --set-env-vars="GOOGLE_SHEETS_CELL_NEXT=$${GOOGLE_SHEETS_CELL_NEXT}" \
          --set-env-vars="GOOGLE_SHEETS_CREDENTIALS=$${GOOGLE_SHEETS_CREDENTIALS}" \
          --set-env-vars="PROGNOSIS_SCHEDULE=$${PROGNOSIS_SCHEDULE}" \
          --set-env-vars="ZOHO_PROGNOSIS_TABLE=$${ZOHO_PROGNOSIS_TABLE}"
        bash cloud/update_prognosis_scheduler.sh

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_JOB_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
